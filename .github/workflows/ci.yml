name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel older runs on the same branch — saves CI minutes when you push
# rapidly and only the latest commit matters.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Backend — Python tests. Live Postgres tests are gated by env and
  # skip cleanly here because CYBERALERTX_TEST_DB_URL is not set.
  # ------------------------------------------------------------------
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Type-check (mypy)
        # Strict type checking over the cyberalertx package; config lives in
        # pyproject.toml [tool.mypy]. Runs before pytest so a type regression
        # fails fast with a clear signal.
        run: mypy

      - name: Run pytest
        run: pytest -q --tb=short

  # ------------------------------------------------------------------
  # Frontend — Next.js production build. `next build` already runs the
  # TypeScript compiler internally, so type errors fail the job. We
  # intentionally skip a separate lint step: ESLint isn't configured in
  # the repo, and `next lint` is deprecated as of Next.js 15 (it prompts
  # for an interactive setup that hangs in CI).
  # ------------------------------------------------------------------
  frontend:
    name: Frontend build (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Build hits /healthz during static-page generation; with no API
          # up in CI, fetch fails — the page still renders via fallback.
          # Telemetry off to keep logs clean.
          NEXT_TELEMETRY_DISABLED: "1"

  # ------------------------------------------------------------------
  # Deploy — SSH to the VPS and run server/deploy.sh. Runs ONLY when both
  # test jobs pass AND this is a push to main (never on PRs or other
  # branches; forked-PR runs can't see secrets anyway). Serialized via its
  # own concurrency group so two deploys never overlap.
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: vps-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Fail the job if any deploy command exits non-zero.
          script_stop: true
          # npm ci + next build can take a few minutes.
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd ~/cax
            ./server/deploy.sh
