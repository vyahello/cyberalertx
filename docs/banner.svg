<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="CyberAlertX">
  <!-- README banner. Renders at full width in GitHub markdown.
       Same brand identity as frontend/public/brand/og-mark.svg, sized
       for the long landscape aspect typical of repo headers. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1116"/>
      <stop offset="100%" stop-color="#161A21"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#4F8AC9" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4F8AC9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- Brand lockup, vertically centered. Glyph 96px, wordmark Inter 64px. -->
  <g transform="translate(110 110)">
    <g fill="none" stroke="#4F8AC9" stroke-width="6"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 17 A33 33 0 0 1 12 83" opacity="0.30"/>
      <path d="M21 30 A21 21 0 0 1 21 70" opacity="0.55"/>
      <path d="M29 40 A10 10 0 0 1 29 60" opacity="0.85"/>
    </g>
    <circle cx="66" cy="50" r="10" fill="#4F8AC9"/>
    <text x="128" y="72"
          font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-size="64" font-weight="600" letter-spacing="-0.015em"
          fill="#E6E8EC">CyberAlertX</text>
  </g>

  <!-- Tagline beneath, centered horizontally to the lockup. -->
  <text x="110" y="225"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="400" letter-spacing="0"
        fill="#9CA3AF">Today's cybersecurity threats in plain English.</text>
  <text x="110" y="252"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="400" letter-spacing="0"
        fill="#9CA3AF">What happened, who it hits, what to do — without the panic or the jargon.</text>

  <!-- Right side: small section indicators (visual rhythm only). -->
  <g transform="translate(1100 110)" font-family="'Inter', system-ui, sans-serif"
     font-size="11" font-weight="600" letter-spacing="0.18em" fill="#6B7280">
    <text x="0" y="14">INGEST</text>
    <line x1="0" y1="22" x2="80" y2="22" stroke="#2A2F38" stroke-width="1"/>
    <text x="0" y="48">RENDER</text>
    <line x1="0" y1="56" x2="80" y2="56" stroke="#2A2F38" stroke-width="1"/>
    <text x="0" y="82">SERVE</text>
    <line x1="0" y1="90" x2="80" y2="90" stroke="#2A2F38" stroke-width="1"/>
  </g>

  <!-- Bottom-left small caps label. -->
  <text x="110" y="295"
        font-family="'Inter', system-ui, sans-serif"
        font-size="11" font-weight="600" letter-spacing="0.22em"
        fill="#4F8AC9">CYBERALERTX.COM</text>
</svg>
