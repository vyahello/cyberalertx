<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="CyberAlertX">
  <!-- README banner — Aperture identity. Renders at full width in GitHub
       markdown. Same brand language as frontend/public/brand/og-mark.svg,
       sized for the long landscape aspect typical of repo headers. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#061523"/>
      <stop offset="100%" stop-color="#0B0E12"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>

  <!-- Brand lockup, vertically centered. Aperture glyph 96px (rendered from
       the master 100×100 grid via nested SVG) + 32px gap + wordmark. -->
  <g transform="translate(110 110)">
    <svg x="0" y="0" viewBox="0 0 100 100" width="100" height="100">
      <g fill="none" stroke="#EAF4FF" stroke-width="3.5">
        <circle cx="50" cy="50" r="42" opacity="0.22"/>
        <circle cx="50" cy="50" r="30" opacity="0.45"/>
        <circle cx="50" cy="50" r="18" opacity="0.7"/>
      </g>
      <circle cx="50" cy="50" r="5" fill="#EAF4FF"/>
      <circle cx="76" cy="24" r="14" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.35"/>
      <circle cx="76" cy="24" r="9" fill="#00E5FF"/>
    </svg>
    <text x="132" y="72"
          font-family="'Space Grotesk', Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-size="64" font-weight="600" letter-spacing="-0.025em"
          fill="#EAF4FF">CyberAlertX</text>
  </g>

  <!-- Tagline beneath, left-aligned with the lockup. Two lines:
       (1) brand promise — short, confident.
       (2) editorial frame — the three questions that drive every post. -->
  <text x="110" y="225"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="24" font-weight="500" letter-spacing="-0.005em"
        fill="#EAF4FF">Daily cyber intel for real users.</text>
  <text x="110" y="258"
        font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="400" letter-spacing="0"
        fill="#9CA3AF">What happened. Who it hits. What to do.</text>

  <!-- Right side: small section indicators (visual rhythm only). -->
  <g transform="translate(1100 110)" font-family="'Inter', system-ui, sans-serif"
     font-size="11" font-weight="600" letter-spacing="0.18em" fill="#6B7280">
    <text x="0" y="14">INGEST</text>
    <line x1="0" y1="22" x2="80" y2="22" stroke="#2A2F38" stroke-width="1"/>
    <text x="0" y="48">RENDER</text>
    <line x1="0" y1="56" x2="80" y2="56" stroke="#2A2F38" stroke-width="1"/>
    <text x="0" y="82">SERVE</text>
    <line x1="0" y1="90" x2="80" y2="90" stroke="#2A2F38" stroke-width="1"/>
  </g>

  <!-- Bottom-left small caps label. -->
  <text x="110" y="295"
        font-family="'JetBrains Mono', 'Courier New', monospace"
        font-size="11" font-weight="600" letter-spacing="0.22em"
        fill="#00E5FF">CYBERALERTX.COM</text>
</svg>
