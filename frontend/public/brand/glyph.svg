<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="24" height="24" role="img" aria-label="CyberAlertX">
  <title>CyberAlertX</title>
  <!-- Direction 02 "Aperture": three concentric radar rings + bullseye + one
       offset cyan alert ping. Rings + bullseye theme through currentColor so
       this file works on dark + light contexts; the ping stays cyan as the
       fixed signal-vs-noise anchor. -->
  <g fill="none" stroke="currentColor" stroke-width="3.5">
    <circle cx="50" cy="50" r="42" opacity="0.22"/>
    <circle cx="50" cy="50" r="30" opacity="0.45"/>
    <circle cx="50" cy="50" r="18" opacity="0.7"/>
  </g>
  <circle cx="50" cy="50" r="5" fill="currentColor"/>
  <circle cx="76" cy="24" r="14" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.35"/>
  <circle cx="76" cy="24" r="9" fill="#00E5FF"/>
</svg>
