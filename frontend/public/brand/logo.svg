<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 24" height="24" role="img" aria-label="CyberAlertX logo">
  <title>CyberAlertX</title>
  <!-- Glyph: stepped concentric arcs + accent dot. currentColor inherits from
       the surrounding element so the same file works on dark + light themes. -->
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 4 A8 8 0 0 1 3 20" opacity="0.30"/>
    <path d="M5 7 A5 5 0 0 1 5 17" opacity="0.55"/>
    <path d="M7 9.5 A2.5 2.5 0 0 1 7 14.5" opacity="0.85"/>
  </g>
  <circle cx="16" cy="12" r="2.5" fill="currentColor"/>
  <!-- Wordmark. Inter is preferred; the fallback chain covers headless renders
       (Inkscape, GitHub preview). When you outline-to-paths for distribution
       to non-Inter contexts, replace this element with the resulting <path>s. -->
  <text x="32" y="17"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="600" letter-spacing="-0.005em"
        fill="currentColor">CyberAlertX</text>
</svg>
