<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- 16px-explicit variant: two arcs instead of three; the innermost arc
       collapses below stroke width at this scale and would muddy the read.
       Stroke 1.5 keeps lines crisp without becoming a smear. -->
  <g fill="none" stroke="#4F8AC9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 4 A4 4 0 0 1 3 12" opacity="0.40"/>
    <path d="M4.5 6 A2 2 0 0 1 4.5 10" opacity="0.80"/>
  </g>
  <circle cx="11" cy="8" r="2" fill="#4F8AC9"/>
</svg>
