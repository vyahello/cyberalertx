<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- 16px-explicit Aperture. At this size the outermost ring would fight
       the canvas edge so we drop it; two rings + bullseye + ping is what
       reads cleanly. Stroke 1.4 keeps lines crisp without smudging into
       the circle interiors. -->
  <g fill="none" stroke="#EAF4FF" stroke-width="1.4">
    <circle cx="8" cy="8" r="5.2" opacity="0.55"/>
    <circle cx="8" cy="8" r="2.6" opacity="0.85"/>
  </g>
  <circle cx="8" cy="8" r="1" fill="#EAF4FF"/>
  <circle cx="12" cy="4" r="2" fill="#00E5FF"/>
</svg>
