<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 32px Aperture variant — all three rings visible, ping at 8 o'clock
       from the bullseye matches the master 100×100 art at this resolution.
       Stroke 1.6 reads confidently without going block-thick. -->
  <g fill="none" stroke="#EAF4FF" stroke-width="1.6">
    <circle cx="16" cy="16" r="13.5" opacity="0.30"/>
    <circle cx="16" cy="16" r="9.5" opacity="0.55"/>
    <circle cx="16" cy="16" r="5.8" opacity="0.85"/>
  </g>
  <circle cx="16" cy="16" r="1.8" fill="#EAF4FF"/>
  <circle cx="24" cy="8" r="4.4" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.4"/>
  <circle cx="24" cy="8" r="3" fill="#00E5FF"/>
</svg>
