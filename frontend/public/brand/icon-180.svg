<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Apple touch icon — Aperture on the brand's deep navy. iOS applies the
       rounded-rectangle mask itself; we ship a solid bg so the corners
       render clean if any older target skips the mask. For PNG fallback
       render this SVG at exact 180×180 via Sharp / Inkscape. -->
  <rect width="180" height="180" fill="#061523"/>
  <g fill="none" stroke="#EAF4FF" stroke-width="5">
    <circle cx="90" cy="90" r="64" opacity="0.22"/>
    <circle cx="90" cy="90" r="46" opacity="0.45"/>
    <circle cx="90" cy="90" r="28" opacity="0.7"/>
  </g>
  <circle cx="90" cy="90" r="8" fill="#EAF4FF"/>
  <circle cx="129" cy="51" r="22" fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.35"/>
  <circle cx="129" cy="51" r="14" fill="#00E5FF"/>
</svg>
