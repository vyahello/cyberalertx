<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Apple touch icon. Solid background + brand glyph centered with safe
       margins. iOS may apply rounded-rectangle mask + subtle gloss on older
       targets; the solid bg ensures the corners render clean either way.
       For PNG fallback (older iOS), render this SVG to apple-touch-icon.png
       via Sharp / Inkscape at exact 180x180. -->
  <rect width="180" height="180" fill="#0E1116"/>
  <g fill="none" stroke="#4F8AC9" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M45 35 A55 55 0 0 1 45 145" opacity="0.30"/>
    <path d="M60 55 A35 35 0 0 1 60 125" opacity="0.55"/>
    <path d="M75 73 A17 17 0 0 1 75 107" opacity="0.85"/>
  </g>
  <circle cx="125" cy="90" r="17" fill="#4F8AC9"/>
</svg>
