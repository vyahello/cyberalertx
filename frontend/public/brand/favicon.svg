<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Hard-coded ink so browser tabs render the brand regardless of parent
       currentColor (tabs don't have one). On dark tabs the ink reads
       light-blue; light tabs render the same ink at lower contrast. The
       alert ping stays cyan in both. -->
  <g fill="none" stroke="#EAF4FF" stroke-width="3.5">
    <circle cx="50" cy="50" r="42" opacity="0.30"/>
    <circle cx="50" cy="50" r="30" opacity="0.55"/>
    <circle cx="50" cy="50" r="18" opacity="0.85"/>
  </g>
  <circle cx="50" cy="50" r="5" fill="#EAF4FF"/>
  <circle cx="76" cy="24" r="14" fill="none" stroke="#00E5FF" stroke-width="2" opacity="0.4"/>
  <circle cx="76" cy="24" r="9" fill="#00E5FF"/>
</svg>
