<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Hard-coded accent so browser tabs render the brand color even when no
       parent has set currentColor. For light/dark adaptation, the modern
       approach is media-query CSS inside the SVG (uncomment <style> below). -->
  <style>
    /* @media (prefers-color-scheme: dark) { :root { color: #5E9BD8; } } */
  </style>
  <g fill="none" stroke="#4F8AC9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 4 A8 8 0 0 1 3 20" opacity="0.30"/>
    <path d="M5 7 A5 5 0 0 1 5 17" opacity="0.55"/>
    <path d="M7 9.5 A2.5 2.5 0 0 1 7 14.5" opacity="0.85"/>
  </g>
  <circle cx="16" cy="12" r="2.5" fill="#4F8AC9"/>
</svg>
