# /etc/nginx/sites-available/cyberalertx
#
# Reverse proxy: same domain for frontend and API.
#   /posts, /healthz, /admin, /feedback   →  FastAPI :8000
#   /brand/*                              →  Next.js public/ (direct static)
#   /                                     →  Next.js :3000
#
# SSL via Cloudflare Origin Certificate (15-year validity).
# Set Cloudflare SSL mode to "Full (strict)" for end-to-end TLS.

# HTTP → HTTPS redirect. Cloudflare normally does this at edge, but the
# block catches direct origin hits (probes, manual curl).
server {
    listen 80;
    server_name cyberalertx.com www.cyberalertx.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cyberalertx.com www.cyberalertx.com;

    ssl_certificate     /etc/ssl/cyberalertx/origin.crt;
    ssl_certificate_key /etc/ssl/cyberalertx/origin.key;

    # --- Security headers (Wapiti hardening) ---------------------------------
    # Inherited by `location /` and the API location (neither sets its own
    # add_header). Cloudflare forwards origin response headers, so these also
    # reach the client through the edge. TLS-version / HSTS are managed at
    # Cloudflare (Min TLS 1.2 + HSTS toggle); HSTS is also set here for direct
    # origin hits. `always` so error responses get them too.
    add_header X-Frame-Options        "DENY"                                     always;  # clickjacking
    add_header X-Content-Type-Options "nosniff"                                  always;  # MIME sniffing
    add_header Referrer-Policy        "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"   always;
    # CSP starts in REPORT-ONLY: it logs violations without blocking, so it
    # cannot break the live site. Watch the browser console / Cloudflare NEL,
    # confirm Next.js + Umami load clean, then rename this header to
    # `Content-Security-Policy` (drop `-Report-Only`) to enforce and close the
    # finding. `'unsafe-inline'` is required for Next.js App Router's inline
    # hydration scripts; `cloud.umami.is` is the analytics tracker.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' https://cloud.umami.is; connect-src 'self' https://cloud.umami.is; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Feedback POST is tiny. Cap at 64KB to discourage abuse.
    client_max_body_size 64k;

    # Cloudflare gzips at edge but origin gzip helps when bypassed.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    # API endpoints — FastAPI on :8000
    location ~ ^/(posts|healthz|admin|feedback)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Brand static — serve directly from disk (skips Next.js round-trip).
    location /brand/ {
        alias /home/cax/cax/frontend/public/brand/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else → Next.js on :3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
